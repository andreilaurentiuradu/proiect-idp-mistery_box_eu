global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

scrape_configs:

  # ── Flask microservices ─────────────────────────────────────────────────────
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:5001"]
    metrics_path: /metrics

  - job_name: business-service
    static_configs:
      - targets: ["business-service:5002"]
    metrics_path: /metrics

  - job_name: payments-service
    static_configs:
      - targets: ["payments-service:5003"]
    metrics_path: /metrics

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ── Redis ───────────────────────────────────────────────────────────────────
  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  # ── Kong API Gateway ────────────────────────────────────────────────────────
  - job_name: kong
    static_configs:
      - targets: ["kong:8100"]
    metrics_path: /metrics
