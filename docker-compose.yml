version: "3.9"

x-db-env: &db-env
  DATABASE_URL: postgresql://idp:idp@postgres:5432/idpdb
  JWT_SECRET: mysecretkey123

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idp
      POSTGRES_PASSWORD: idp
      POSTGRES_DB: idpdb
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp -d idpdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # ── pgAdmin ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - backend

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      <<: *db-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ── Business Logic Service ──────────────────────────────────────────────────
  business-service:
    build: ./business-service
    environment:
      <<: *db-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ── Payments Service ────────────────────────────────────────────────────────
  payments-service:
    build: ./payments-service
    environment:
      <<: *db-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ── Kong API Gateway ────────────────────────────────────────────────────────
  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"   # proxy (all client traffic goes here)
      - "8001:8001"   # admin API
    depends_on:
      - auth-service
      - business-service
      - payments-service
    networks:
      - backend
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - kong
    networks:
      - backend

  # ── Portainer ───────────────────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - backend

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - business-service
      - payments-service
    networks:
      - backend

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - backend

volumes:
  pg_data:
  portainer_data:
  grafana_data:

networks:
  backend:
    driver: bridge
